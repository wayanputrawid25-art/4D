# ForexOS Trading Configuration
# All trading parameters must be defined here. No hardcoding allowed.

# =============================================================================
# RISK MANAGEMENT
# =============================================================================
risk:
  # Maximum risk per trade as percentage of account balance
  maxRiskPerTrade: 2.0  # 2%
  
  # Maximum daily risk as percentage of account
  maxDailyRisk: 6.0  # 6%
  
  # Maximum number of open positions
  maxOpenPositions: 5
  
  # Maximum correlation between positions (0-1)
  maxCorrelation: 0.5
  
  # Minimum risk-reward ratio for trades
  minRiskReward: 1.5
  
  # Maximum drawdown limit (percentage)
  maxDrawdownLimit: 20.0
  
  # Maximum consecutive losses before pause
  maxConsecutiveLosses: 5
  
  # Position sizing method: fixed, kelly, or adaptive
  positionSizingMethod: "adaptive"
  
  # Kelly fraction for position sizing (0-1)
  kellyFraction: 0.25
  
  # Use fixed fractional position sizing
  fixedFractional: 0.02  # 2% of account
  
  # Maximum position size in lots
  maxPositionSize: 10.0
  
  # Minimum position size in lots
  minPositionSize: 0.01

